# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - tintuc

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Build Frontend (Vite)
        run: |
          cd cloud-news-website-news-frontend/cloud-news-website-news-frontend
          npm install
          npm run build
          # Copy thư mục dist vào trong thư mục backend
          cp -r dist ../press-backend/dist

      - name: Verify dist folder
        run: ls -R cloud-news-website-news-frontend/press-backend/dist

      - name: Install Backend dependencies
        run: |
          cd cloud-news-website-news-frontend/press-backend
          npm install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: cloud-news-website-news-frontend/press-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6F1ABA12FE1C4097B785CF1948612B95 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4077C35D7C8040E0A76CC2606AAAECDC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8D2C1346A498466B905B0F4F1766D7CB }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tintuc'
          slot-name: 'Production'
          package: .